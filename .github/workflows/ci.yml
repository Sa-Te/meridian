name: CI

on:
  push:
  pull_request:

defaults:
  run:
    shell: bash

jobs:
  api:
    name: API - lint, type-check, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    env:
      # Points at the postgres service below, not the docker-compose service
      # name -- CI runs pytest directly on the runner, not inside a container.
      DATABASE_URL: postgresql+asyncpg://meridian:meridian@localhost:5432/meridian
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: meridian
          POSTGRES_PASSWORD: meridian
          POSTGRES_DB: meridian
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U meridian"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff check)
        run: ruff check .

      - name: Format check (ruff format)
        run: ruff format --check .

      - name: Type-check (mypy)
        run: mypy app

      - name: Lint eval harness (ruff check)
        run: ruff check ../../eval

      - name: Format check eval harness (ruff format)
        run: ruff format --check ../../eval

      - name: Type-check eval harness (mypy)
        run: mypy ../../eval

      - name: Run database migrations
        run: alembic upgrade head

      # Split so a broken unit test fails fast, before paying for the
      # slower, Postgres-backed integration suite.
      - name: Unit tests (pytest)
        run: pytest -q tests/unit

      - name: Integration tests (pytest)
        run: pytest -q tests/integration

      # eval/'s own unit tests (golden-question resolution, the judge
      # prompt, the retry/cache wrappers) use fakes/stubs exactly like
      # apps/api's own suite -- no real LLM call, no reason to wait for
      # the separate eval-suite workflow (docs/adr/0016) just to catch a
      # regression here.
      - name: Unit tests (eval harness)
        working-directory: ${{ github.workspace }}
        run: python -m pytest -q eval/tests

  web:
    name: Web - lint, type-check, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Type-check (tsc)
        run: npm run typecheck

      - name: Component tests (vitest)
        run: npm run test:ci

  mcp:
    name: MCP server - lint, type-check, smoke test
    needs: [api, web]
    runs-on: ubuntu-latest
    env:
      # Points at the postgres service below, not the docker-compose service
      # name -- same reasoning as the api job.
      DATABASE_URL: postgresql+asyncpg://meridian:meridian@localhost:5432/meridian
      LLM_PROVIDER: gemini
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      EMBEDDING_PROVIDER: local
      # Where the mcp_server smoke tests reach the api server started below.
      MERIDIAN_API_BASE_URL: http://localhost:8000
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: meridian
          POSTGRES_PASSWORD: meridian
          POSTGRES_DB: meridian
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U meridian"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install api dependencies
        working-directory: apps/api
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run database migrations
        working-directory: apps/api
        run: alembic upgrade head

      # The MCP server is an HTTP client of the real backend (docs/adr/0011),
      # not a set of functions imported in-process -- its smoke test needs an
      # actual running api server. Unlike the eval workflow (eval.yml), which
      # calls app code directly in-process, this needs a live HTTP server. It
      # spends zero real Gemini calls here regardless: the fresh CI database
      # has no ingested meetings, so ask_meetings always declines before
      # reaching the LLM (see app/services/guardrails/output_guardrail.py's
      # passes_retrieval_confidence on an empty retrieval set).
      - name: Start api server in the background
        working-directory: apps/api
        run: |
          set -euo pipefail
          nohup uvicorn app.main:app --host 0.0.0.0 --port 8000 > /tmp/api-server.log 2>&1 &
          for _ in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "api server did not become healthy in time" >&2
          cat /tmp/api-server.log
          exit 1

      - name: Install mcp_server dependencies
        working-directory: apps/mcp_server
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff check)
        working-directory: apps/mcp_server
        run: ruff check .

      - name: Format check (ruff format)
        working-directory: apps/mcp_server
        run: ruff format --check .

      - name: Type-check (mypy)
        working-directory: apps/mcp_server
        run: mypy mcp_server

      - name: Smoke test each tool against the running api (pytest)
        working-directory: apps/mcp_server
        run: pytest -q

  docker-build:
    name: Build and tag Docker images
    # The final stage of the fast, per-push pipeline: runs once every
    # lint/type-check/test lane (api, web, mcp) has passed. The eval-suite
    # quality gate is intentionally NOT a dependency here -- it runs in its
    # own workflow (.github/workflows/eval.yml), gated to main and manual
    # dispatch rather than every push, so it never blocks (or spends real
    # Gemini quota on) routine feature-branch CI. See docs/adr/0016.
    needs: [api, web, mcp]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Tagged with both a moving `:ci` tag (latest green build on any
      # branch) and the immutable commit SHA, so a specific image can be
      # traced back to the exact commit it was built from.
      - name: Build and tag api image
        run: |
          docker build \
            -t meridian-api:ci \
            -t "meridian-api:${{ github.sha }}" \
            ./apps/api

      - name: Build and tag web image
        run: |
          docker build \
            -t meridian-web:ci \
            -t "meridian-web:${{ github.sha }}" \
            ./apps/web
