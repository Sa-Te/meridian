name: CI

on:
  push:
  pull_request:

defaults:
  run:
    shell: bash

jobs:
  api:
    name: API - lint, type-check, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    env:
      # Points at the postgres service below, not the docker-compose service
      # name -- CI runs pytest directly on the runner, not inside a container.
      DATABASE_URL: postgresql+asyncpg://meridian:meridian@localhost:5432/meridian
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: meridian
          POSTGRES_PASSWORD: meridian
          POSTGRES_DB: meridian
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U meridian"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff check)
        run: ruff check .

      - name: Format check (ruff format)
        run: ruff format --check .

      - name: Type-check (mypy)
        run: mypy app

      - name: Run database migrations
        run: alembic upgrade head

      - name: Unit + integration tests (pytest)
        run: pytest -q

  web:
    name: Web - lint, type-check, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Type-check (tsc)
        run: npm run typecheck

      - name: Component tests (vitest)
        run: npm run test:ci

  docker-build:
    name: Build Docker images
    needs: [api, web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build api image
        run: docker build -t meridian-api:ci ./apps/api

      - name: Build web image
        run: docker build -t meridian-web:ci ./apps/web
