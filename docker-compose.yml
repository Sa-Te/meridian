services:
  postgres:
    image: pgvector/pgvector:pg16
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-meridian}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-meridian}
      POSTGRES_DB: ${POSTGRES_DB:-meridian}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-meridian}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
    env_file: .env
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      # Caches the local embedding model (ADR-0004) across container
      # restarts/rebuilds so it isn't re-downloaded (~440MB) every time.
      - hf_cache:/root/.cache/huggingface
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./apps/web
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  hf_cache:
